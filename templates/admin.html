<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Contact Messages</h2>

<table border="1">
<tr>
  <th>ID</th>
  <th>Name</th>
  <th>Email</th>
  <th>Message</th>
  <th>Time</th>
</tr>

{% for row in data %}
<tr>
  <td>{{ row[0] }}</td>
  <td>{{ row[1] }}</td>
  <td>{{ row[2] }}</td>
  <td>{{ row[3] }}</td>
  <td>{{ row[4] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
